name: transapt
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.21
  - pandas>=1.3
  - scikit-learn>=1.0
  - matplotlib>=3.5
  - seaborn>=0.11
  - pip:
    - --index-url https://pypi.tuna.tsinghua.edu.cn/simple
    - --extra-index-url https://download.pytorch.org/whl/cu118
    - torch>=1.10
    - biopython>=1.79
    - tensorflow>=2.8,<2.16
    - umap-learn>=0.5
